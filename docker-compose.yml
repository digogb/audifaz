services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    volumes:
      - ./data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - SKIP_STARTUP_GEN=${SKIP_STARTUP_GEN:-}
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:-}
      - DEFAULT_BRAND=${DEFAULT_BRAND:-audifaz}
      - BACKUP_DIR=${BACKUP_DIR:-/data/backups}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - APP_ENV=${APP_ENV:-development}
      - TZ=America/Fortaleza
    restart: unless-stopped

  audio-worker:
    build:
      context: ./audio-worker
    volumes:
      - ./data:/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/audifaz.db
      - AUDIOS_DIR=/data/audios
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GCP_TTS_API_KEY=${GCP_TTS_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - VOICE_ANA=${VOICE_ANA:-pt-BR-Chirp3-HD-Kore}
      - VOICE_LUCAS=${VOICE_LUCAS:-pt-BR-Chirp3-HD-Charon}
      - POLL_INTERVAL=30
      - MAX_RETRIES=3
      - TZ=America/Fortaleza
    depends_on:
      - app
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

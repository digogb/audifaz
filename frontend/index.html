<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AudiFaz</title>
    <style>
      body { background-color: #F8F9FD; }

      /* Markdown content on white background */
      .prose-study h2 { font-size: 1rem; font-weight: 700; color: #1A252F; margin: 1.25rem 0 0.5rem; border-bottom: 2px solid #F3E5F5; padding-bottom: 0.25rem; }
      .prose-study h3 { font-size: 0.9rem; font-weight: 600; color: #8E44AD; margin: 1rem 0 0.375rem; }
      .prose-study p { font-size: 0.875rem; color: #1A252F; line-height: 1.7; margin-bottom: 0.625rem; }
      .prose-study ul, .prose-study ol { padding-left: 1.25rem; margin-bottom: 0.75rem; }
      .prose-study li { font-size: 0.875rem; color: #1A252F; line-height: 1.65; margin-bottom: 0.2rem; }
      .prose-study strong { color: #1A252F; font-weight: 700; }
      .prose-study em { color: #4A5568; }
      .prose-study code { background: #F3E5F5; color: #8E44AD; font-size: 0.8rem; padding: 0.1rem 0.35rem; border-radius: 4px; font-family: monospace; }
      .prose-study pre { background: #F8F9FD; border: 1px solid #E8E8F0; border-radius: 8px; padding: 0.75rem; overflow-x: auto; margin-bottom: 0.75rem; }
      .prose-study pre code { background: none; padding: 0; color: #2C3E50; font-size: 0.8rem; }
      .prose-study blockquote { border-left: 3px solid #8E44AD; padding-left: 0.75rem; color: #7F8C8D; font-style: italic; margin: 0.75rem 0; }
      .prose-study table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-bottom: 0.75rem; }
      .prose-study th { background: #F3E5F5; color: #2C3E50; font-weight: 600; padding: 0.4rem 0.6rem; text-align: left; }
      .prose-study td { padding: 0.35rem 0.6rem; border-bottom: 1px solid #E8E8F0; color: #2C3E50; }
      .prose-study hr { border: none; border-top: 1px solid #E8E8F0; margin: 1rem 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

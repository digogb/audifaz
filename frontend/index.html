<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1527" />
    <title>AudiFaz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body {
        background-color: #0B1527;
        color: #FFFFFF;
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Glow radiais de fundo */
      .app-glow {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .app-glow::before,
      .app-glow::after {
        content: '';
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(60px);
      }
      .app-glow::before {
        top: -200px;
        right: -150px;
        background: radial-gradient(circle, rgba(210, 110, 50, 0.25) 0%, transparent 70%);
      }
      .app-glow::after {
        bottom: -300px;
        left: -200px;
        background: radial-gradient(circle, rgba(40, 90, 200, 0.20) 0%, transparent 70%);
      }

      /* Scrollbar (dark) */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 8px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

      /* Markdown — dark theme */
      .prose-study h1, .prose-study h2 {
        font-size: 1rem;
        font-weight: 700;
        color: #FFFFFF;
        margin: 1.5rem 0 0.6rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid rgba(255,255,255,0.10);
        letter-spacing: -0.01em;
      }
      .prose-study h3 {
        font-size: 0.9rem;
        font-weight: 600;
        color: #5B9EF4;
        margin: 1.1rem 0 0.4rem;
      }
      .prose-study h4 {
        font-size: 0.85rem;
        font-weight: 600;
        color: #A8B5CC;
        margin: 0.9rem 0 0.3rem;
      }
      .prose-study p {
        font-size: 0.875rem;
        color: rgba(255,255,255,0.78);
        line-height: 1.7;
        margin-bottom: 0.7rem;
      }
      .prose-study ul, .prose-study ol { padding-left: 1.25rem; margin-bottom: 0.8rem; }
      .prose-study li {
        font-size: 0.875rem;
        color: rgba(255,255,255,0.78);
        line-height: 1.65;
        margin-bottom: 0.25rem;
      }
      .prose-study li::marker { color: #5B9EF4; }
      .prose-study strong { color: #FFFFFF; font-weight: 700; }
      .prose-study em { color: #D4845A; font-style: normal; font-weight: 500; }
      .prose-study code {
        background: rgba(91, 158, 244, 0.15);
        color: #5B9EF4;
        font-size: 0.78rem;
        padding: 0.12rem 0.4rem;
        border-radius: 4px;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 500;
      }
      .prose-study pre {
        background: #090F1C;
        border: 0.5px solid rgba(255,255,255,0.10);
        border-radius: 10px;
        padding: 0.85rem 1rem;
        overflow-x: auto;
        margin-bottom: 0.85rem;
      }
      .prose-study pre code {
        background: none;
        padding: 0;
        color: #FFFFFF;
        font-size: 0.8rem;
      }
      .prose-study blockquote {
        border-left: 3px solid #D4845A;
        background: rgba(212, 132, 90, 0.06);
        padding: 0.5rem 0.85rem;
        color: rgba(255,255,255,0.7);
        font-style: italic;
        margin: 0.85rem 0;
        border-radius: 0 8px 8px 0;
      }
      .prose-study table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
        margin-bottom: 0.85rem;
        border-radius: 8px;
        overflow: hidden;
        border: 0.5px solid rgba(255,255,255,0.10);
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
      @media (min-width: 640px) {
        .prose-study table { display: table; white-space: normal; }
      }
      .prose-study th {
        background: rgba(91, 158, 244, 0.10);
        color: #FFFFFF;
        font-weight: 600;
        padding: 0.5rem 0.7rem;
        text-align: left;
        border-bottom: 1px solid rgba(255,255,255,0.10);
      }
      .prose-study td {
        padding: 0.4rem 0.7rem;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        color: rgba(255,255,255,0.78);
      }
      .prose-study tr:last-child td { border-bottom: none; }
      .prose-study hr {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.10);
        margin: 1.25rem 0;
      }
      .prose-study a {
        color: #5B9EF4;
        text-decoration: none;
      }
      .prose-study a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="app-glow"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
